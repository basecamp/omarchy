# Makes hyprsunset do nothing to the screen by default
# Without this, the default applies some tint to the monitor
profile {
    time = 07:00
    identity = true
}

# For an automatic time-based schedule, open Trigger > Toggle > Nightlight in
# the Omarchy menu, or run `omarchy tui nightlight` to open the manager
# directly (set intensity and start/end times). To toggle the schedule on/off
# without opening the TUI, run `omarchy toggle nightlight-schedule`. When
# enabled, the schedule writes profiles here and adds hyprsunset to autostart.
#
# To schedule by hand instead, add to ~/.config/hypr/autostart.lua:
#   o.launch_on_start("hyprsunset")
# and append a profile block here:
# profile {
#     time = 20:00
#     temperature = 4000
# }
