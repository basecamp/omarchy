# Float Steam
windowrule {
    name = steam-float
    match:class = steam

    float = true
}

windowrule {
    name = steam-main-window
    match:class = steam
    match:title = Steam

    center = true
    size = 1100 700
}

windowrule {
    name = steam-friends
    match:class = steam
    match:title = Friends List

    size = 460 800
}

windowrule {
    name = steam-opacity
    match:class = steam

    opacity = 1 1
}

windowrule {
    name = steam-idleinhibit
    match:class = steam

    idle_inhibit = fullscreen
}
