# Picture-in-picture overlays
windowrule {
    name = pip-tag
    match:title = Picture.?in.?[Pp]icture

    tag = +pip
}

windowrule {
    name = pip-rules
    match:tag = pip

    float = true
    pin = true
    size = 600 338
    keep_aspect_ratio = true
    border_size = 0
    opacity = 1 1
    move = 100%-w-40 4%
}
